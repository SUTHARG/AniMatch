name: animatch
description: "AniMatch - Anime & Manga Discovery App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  http: ^1.2.0
  cached_network_image: ^3.4.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/final_app_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/final_app_logo.png"
  windows:
    generate: true
    image_path: "assets/images/final_app_logo.png"

flutter_native_splash:
  color: "#000000"
  image: assets/images/final_splash_logo.png
  android_12:
    color: "#000000"
    image: assets/images/final_splash_logo.png
  web: true
  ios: true

